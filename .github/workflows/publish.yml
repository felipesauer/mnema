name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish (${{ github.event.release.tag_name }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version $PKG_VERSION matches the release tag"

      - name: Publish-readiness gate
        # Runs build + lint + test + coverage + bench + MCP smoke +
        # tarball checks, and leaves a fresh dist/ behind.
        run: pnpm publish:check

      - name: Resolve dist-tag from version
        id: disttag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # The dist-tag the release is published under.
          case "$VERSION" in
            *-alpha.*) TAG=alpha ;;
            *-beta.*)  TAG=beta ;;
            *-rc.*)    TAG=rc ;;
            *)         TAG=latest ;;
          esac
          # Before a stable 1.x, `latest` should track the newest prerelease
          # so `npm install <pkg>` (no tag) gets the current alpha — the repo
          # has no stable line yet. Once a 1.0.0 ships, `latest` becomes the
          # stable channel and prereleases stop touching it.
          MAJOR="${VERSION%%.*}"
          ALSO_LATEST=false
          if [ "$TAG" != "latest" ] && [ "$MAJOR" = "0" ]; then
            ALSO_LATEST=true
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "also_latest=$ALSO_LATEST" >> "$GITHUB_OUTPUT"
          echo "publishing $VERSION under dist-tag '$TAG' (also latest: $ALSO_LATEST)"

      - name: Publish
        # --ignore-scripts skips the prepack/prepublishOnly hooks: the
        # gate step above already built dist/ and ran the full check on
        # this exact tree, so re-running them here would only duplicate
        # work. --provenance signs the tarball against this run.
        run: pnpm publish --no-git-checks --ignore-scripts --tag ${{ steps.disttag.outputs.tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Point `latest` at the newest pre-1.0 prerelease
        # Pre-1.0 only: keep `latest` on the current alpha so a bare
        # `npm install` isn't pinned to a stale old version.
        if: steps.disttag.outputs.also_latest == 'true'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npm dist-tag add "mnema@$VERSION" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
