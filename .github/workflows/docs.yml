name: Docs

# Builds the VitePress site and publishes it to GitHub Pages (MNEMA-ADR-59).
# Deliberately SEPARATE from ci.yml so a docs change never blocks a code merge
# and a code change never waits on a Pages deploy. Runs on pushes to main that
# touch docs/, and can be dispatched manually.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'scripts/verify-docs-site.mjs'
  workflow_dispatch:

# Pages deploy needs these; nothing else in the repo does, so scope them here.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; a newer push supersedes an older run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build + verify offline-first
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build the site
        run: pnpm docs:build
      - name: Verify offline-first (no external load-time reference)
        run: pnpm verify:docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
